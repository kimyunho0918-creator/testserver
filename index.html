<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 프리미엄 학급 자리 배치표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 기본 & UI 스타일 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f6;
            margin: 0; padding: 30px;
            display: flex; flex-direction: column; align-items: center;
            color: #333;
        }

        h1 { margin-bottom: 30px; color: #2c3e50; font-weight: 800; }

        /* 컨트롤 패널 (상단 카드) */
        .control-panel {
            background: white; border-radius: 16px; padding: 25px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .settings-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.9em; font-weight: 700; color: #5a6a77; }
        .input-group input[type="number"], .input-group input[type="text"], .input-group input[type="file"] {
            padding: 10px 15px; border: 1px solid #ced4da; border-radius: 8px;
            font-size: 1em; font-family: inherit; transition: border-color 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #3498db; }
        
        .radio-group { display: flex; gap: 15px; align-items: center; height: 100%; }
        .radio-group label { font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px;}

        /* 버튼 디자인 */
        .button-group {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            margin-top: 10px; padding-top: 20px; border-top: 1px solid #eee;
        }
        button {
            padding: 12px 24px; font-size: 15px; font-weight: 700;
            border-radius: 10px; border: none; cursor: pointer; color: white;
            transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-apply { background-color: #8e44ad; width: 100%; margin-top: 10px; }
        .btn-random { background-color: #27ae60; }
        .btn-swap { background-color: #2980b9; }
        .btn-complete { background-color: #34495e; }
        .btn-reset { background-color: #e74c3c; }

        /* 상태 알림창 */
        #status-bar {
            background: #e8f8f5; color: #117a65; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; margin-bottom: 20px; display: none;
        }

        /* ---------------- 프린트 영역 및 회전 로직 ---------------- */
        #print-area {
            display: flex; flex-direction: column; align-items: center;
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden; /* 설정 전 숨김 */
        }

        /* 180도 회전 모드 (교탁 시점) */
        #print-area.rotated { transform: rotate(180deg); }
        /* 영역이 돌면 글자도 도니까, 글자들은 다시 원래대로(180도) 돌려줌 */
        #print-area.rotated .seat, 
        #print-area.rotated #teacher-desk, 
        #print-area.rotated .row-indicator {
            transform: rotate(180deg);
        }

        /* 교탁 */
        #teacher-desk {
            width: 160px; height: 50px; background-color: #7f8c8d; color: white;
            display: flex; justify-content: center; align-items: center;
            border-radius: 8px; font-weight: 800; font-size: 1.1em;
            margin-bottom: 30px; letter-spacing: 5px;
            transition: transform 0.6s;
        }

        /* 자리 배치도 그리드 */
        #seating-chart { display: grid; gap: 10px; }
        .grid-normal { grid-template-columns: repeat(8, 75px); }
        .grid-exam { grid-template-columns: repeat(9, 75px); }

        /* 개별 책상(자리) 스타일 */
        .seat {
            width: 75px; height: 60px; display: flex;
            justify-content: center; align-items: center;
            border: 2px solid #cbd5e1; border-radius: 10px;
            font-weight: 700; font-size: 1.1em; color: #1e293b;
            background-color: #f1f5f9; cursor: pointer; 
            transition: background-color 0.2s, transform 0.6s, box-shadow 0.2s;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.05); /* 책상 입체감 */
        }
        
        .seat.empty {
            background-color: #fafbfc; border: 2px dashed #dde1e5;
            color: #b0bac5; font-size: 0.85em; cursor: default; box-shadow: none;
        }

        /* 완료 시 통로 투명화 */
        #print-area.finished .seat.empty {
            background-color: transparent !important;
            border: none !important;
            color: transparent !important;
        }

        /* 애니메이션 및 교환 선택 */
        .seat.shuffling { animation: pulse 0.4s infinite; background-color: #fef08a !important; border-color: #fde047; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .seat.selected-swap {
            border-color: #f59e0b; background-color: #fef3c7;
            box-shadow: 0 0 0 4px rgba(245,158,11,0.3) !important; z-index: 10;
        }

        .row-indicator {
            text-align: center; font-size: 0.85em; color: #94a3b8; 
            padding: 15px 0 5px; border-bottom: 1px solid #e2e8f0; margin-bottom: 5px;
            transition: transform 0.6s; font-weight: 600; letter-spacing: 2px;
        }
        .normal-span { grid-column: 1 / span 8; }
        .exam-span { grid-column: 1 / span 9; }

        /* 인쇄 모드 최적화 (Ctrl+P 또는 프린트 버튼 클릭 시) */
        @media print {
            body { background: white; padding: 0; }
            .no-print, .control-panel, h1, #status-bar { display: none !important; }
            #print-area { box-shadow: none; padding: 0; width: 100%; transform-origin: center; }
            .seat { border-color: #000; color: #000; }
        }
    </style>
</head>
<body>

    <h1>🏫 프리미엄 학급 자리 배치표</h1>

    <div class="control-panel no-print" id="control-panel">
        <div class="settings-grid">
            <div class="input-group">
                <label>1. 배치 유형</label>
                <div class="radio-group">
                    <label><input type="radio" name="layout" value="normal" checked> 일반형(8열)</label>
                    <label><input type="radio" name="layout" value="exam"> 시험형(9열)</label>
                </div>
            </div>
            <div class="input-group">
                <label>2. 마지막 번호</label>
                <input type="number" id="total-end-number" value="31" min="1">
            </div>
            <div class="input-group">
                <label>3. 제외할 번호 (쉼표 구분)</label>
                <input type="text" id="exclude-numbers" placeholder="예: 5, 12">
            </div>
            <div class="input-group">
                <label>📁 명단 엑셀 업로드 (선택)</label>
                <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv">
            </div>
        </div>
        <button class="btn-apply" onclick="applySettings()">✅ 설정 적용하여 배치판 열기</button>

        <div class="button-group">
            <button class="btn-random" id="random-button" onclick="shuffleAllSeats()" disabled>🎲 랜덤 섞기</button>
            <button class="btn-swap" id="swap-button" onclick="toggleSwapMode()" disabled>🔄 수동 교환</button>
            <button class="btn-complete" id="complete-button" onclick="finishSelection()" disabled>🖨️ 완료 (180도 회전 & 인쇄모드)</button>
            <button class="btn-reset" onclick="location.reload()">↺ 전체 초기화</button>
        </div>
    </div>

    <div id="status-bar"></div>

    <div id="print-area">
        <div id="teacher-desk">교 탁</div>
        <div id="seating-chart"></div>
    </div>

    <script>
        let studentNames = {}; // 엑셀에서 불러온 이름 저장 객체
        let allSeatNumbers = [];
        let seatingMap = [];
        let isSwapMode = false;
        let firstSelected = null;
        let currentLayout = 'normal';

        // 📝 엑셀 파일 로드 및 파싱 로직 (SheetJS 사용)
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // 데이터를 2차원 배열 형태로 가져옴
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1}); 
                    
                    studentNames = {}; // 기존 명단 초기화
                    let count = 0;
                    
                    jsonData.forEach(row => {
                        // 보통 A열(0)이 번호, B열(1)이 이름이라고 가정
                        if (row.length >= 2) {
                            const num = parseInt(row[0]);
                            const name = row[1];
                            if (!isNaN(num) && name) {
                                studentNames[num] = name.toString().trim();
                                count++;
                            }
                        }
                    });
                    
                    if(count > 0) {
                        alert(`총 ${count}명의 이름 명단을 성공적으로 불러왔습니다!`);
                    } else {
                        alert('명단을 찾지 못했습니다. A열에 번호, B열에 이름을 넣어주세요.');
                    }
                } catch (err) {
                    alert('파일을 읽는 중 오류가 발생했습니다.');
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // ⚙️ 설정 적용
        function applySettings() {
            const endNum = parseInt(document.getElementById('total-end-number').value);
            const exclStr = document.getElementById('exclude-numbers').value;
            currentLayout = document.querySelector('input[name="layout"]:checked').value;
            const excludes = exclStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            
            allSeatNumbers = [];
            for (let i = 1; i <= endNum; i++) {
                if (!excludes.includes(i)) allSeatNumbers.push(i);
            }

            buildMap(allSeatNumbers);
            
            const printArea = document.getElementById('print-area');
            const status = document.getElementById('status-bar');
            
            printArea.style.visibility = 'visible';
            printArea.classList.remove('finished', 'rotated');
            document.getElementById('seating-chart').className = currentLayout === 'exam' ? 'grid-exam' : 'grid-normal';
            
            document.getElementById('random-button').disabled = false;
            document.getElementById('swap-button').disabled = false;
            document.getElementById('complete-button').disabled = false;
            
            status.style.display = 'block';
            status.textContent = `✅ 배치가 준비되었습니다. (총 ${allSeatNumbers.length}석)`;
        }

        // 🗺️ 맵 데이터 생성
        function buildMap(numbers) {
            const COLS = currentLayout === 'exam' ? 9 : 8;
            let ROWS = (currentLayout === 'exam' && numbers.length > 30) ? 7 : 6;
            seatingMap = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (currentLayout === 'exam') {
                        if ([1, 3, 5, 7].includes(c)) seatingMap[r][c] = 'EMPTY';
                    } else {
                        if ([2, 5].includes(c)) seatingMap[r][c] = 'EMPTY';
                    }
                }
            }

            let numIdx = 0;
            if (currentLayout === 'exam') {
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < 6; r++) {
                        if (seatingMap[r][c] !== 'EMPTY' && numIdx < numbers.length && numIdx < 30) {
                            seatingMap[r][c] = numbers[numIdx++];
                        }
                    }
                }
                if (numIdx < numbers.length && ROWS > 6) {
                    for (let c = COLS - 1; c >= 0; c--) {
                        if (seatingMap[6][c] !== 'EMPTY' && numIdx < numbers.length) {
                            seatingMap[6][c] = numbers[numIdx++];
                        }
                    }
                }
            } else {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (seatingMap[r][c] !== 'EMPTY' && numIdx < numbers.length) {
                            seatingMap[r][c] = numbers[numIdx++];
                        }
                    }
                }
            }
            render();
        }

        // 🎨 화면에 렌더링
        function render() {
            const chart = document.getElementById('seating-chart');
            chart.innerHTML = '';
            const spanClass = currentLayout === 'exam' ? 'exam-span' : 'normal-span';

            seatingMap.forEach((row, r) => {
                const indicator = document.createElement('div');
                indicator.className = `row-indicator ${spanClass}`;
                indicator.textContent = `─── ${r + 1}분단 ───`;
                chart.appendChild(indicator);
                
                row.forEach((cell, c) => {
                    const div = document.createElement('div');
                    div.className = 'seat';
                    
                    if (cell === 'EMPTY') {
                        div.classList.add('empty');
                        div.textContent = '통로';
                    } else if (cell === null) {
                        div.classList.add('empty');
                        div.textContent = '';
                    } else {
                        // ⭐️ 핵심: 엑셀 명단이 있으면 이름, 없으면 번호 출력!
                        const displayText = studentNames[cell] ? studentNames[cell] : cell;
                        div.textContent = displayText;
                        
                        div.dataset.row = r; div.dataset.col = c;
                        div.onclick = handleSeatClick;
                    }
                    chart.appendChild(div);
                });
            });
        }

        // 👆 자리 교환 모드 클릭 이벤트
        function handleSeatClick(e) {
            if (!isSwapMode) return;
            const div = e.currentTarget;
            const r = parseInt(div.dataset.row);
            const c = parseInt(div.dataset.col);
            
            if (!firstSelected) {
                firstSelected = { r, c, div };
                div.classList.add('selected-swap');
            } else {
                // 데이터 Swap
                const temp = seatingMap[firstSelected.r][firstSelected.c];
                seatingMap[firstSelected.r][firstSelected.c] = seatingMap[r][c];
                seatingMap[r][c] = temp;
                render();
                firstSelected = null;
            }
        }

        // 🎲 랜덤 섞기
        function shuffleAllSeats() {
            const btn = document.getElementById('random-button');
            const printArea = document.getElementById('print-area');
            const status = document.getElementById('status-bar');
            
            // 섞을 땐 프린트/회전 모드 풀기
            printArea.classList.remove('finished', 'rotated');
            status.textContent = "🔄 자리를 섞는 중입니다...";
            status.style.backgroundColor = "#fff9c4"; status.style.color = "#f57f17";
            
            btn.disabled = true;
            document.querySelectorAll('.seat:not(.empty)').forEach(s => {
                s.classList.add('shuffling'); s.textContent = '?';
            });
            
            setTimeout(() => {
                const shuffled = [...allSeatNumbers].sort(() => Math.random() - 0.5);
                buildMap(shuffled);
                btn.disabled = false;
                status.textContent = "✅ 새로운 자리 배치가 완료되었습니다.";
                status.style.backgroundColor = "#e8f8f5"; status.style.color = "#117a65";
            }, 800);
        }

        // 🔄 수동 교환 토글
        function toggleSwapMode() {
            isSwapMode = !isSwapMode;
            document.getElementById('print-area').classList.remove('finished', 'rotated');
            firstSelected = null;
            
            const btn = document.getElementById('swap-button');
            const status = document.getElementById('status-bar');
            
            if (isSwapMode) {
                btn.style.backgroundColor = '#f39c12';
                btn.textContent = '🚫 교환 취소';
                status.textContent = "👉 맞바꿀 두 자리를 차례대로 클릭하세요.";
                status.style.backgroundColor = "#fef5e7"; status.style.color = "#d35400";
            } else {
                btn.style.backgroundColor = '#2980b9';
                btn.textContent = '🔄 수동 교환';
                status.textContent = "✅ 수동 교환 모드가 종료되었습니다.";
                status.style.backgroundColor = "#e8f8f5"; status.style.color = "#117a65";
                document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected-swap'));
            }
        }

        // 🖨️ 완료 및 인쇄 모드 전환 (180도 회전)
        function finishSelection() {
            const printArea = document.getElementById('print-area');
            const status = document.getElementById('status-bar');
            
            // 통로 투명화(.finished) & 전체 판 180도 회전(.rotated)
            const isNowFinished = printArea.classList.toggle('finished');
            printArea.classList.toggle('rotated');
            
            if (isNowFinished) {
                status.textContent = "📌 프린트 모드: 통로가 투명해지고 180도 회전했습니다. (Ctrl+P 로 인쇄하세요)";
                status.style.backgroundColor = "#ebf5ff"; status.style.color = "#2c3e50";
                
                // 교환 모드 강제 종료
                isSwapMode = false;
                document.getElementById('swap-button').style.backgroundColor = '#2980b9';
                document.getElementById('swap-button').textContent = '🔄 수동 교환';
            } else {
                status.textContent = "🛠 수정 모드로 복귀했습니다.";
                status.style.backgroundColor = "#e8f8f5"; status.style.color = "#117a65";
            }
        }
    </script>
</body>
</html>
