<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 자리 배치 프로그램 (최종 완성본)</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f0f2f5; padding: 20px;
        }
        #seating-chart {
            display: grid;
            gap: 12px; margin-bottom: 30px; padding: 25px;
            border: 3px solid #2c3e50; background-color: #ffffff;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            visibility: hidden; 
        }
        /* 일반형일 때는 8열, 모의고사형일 때는 9열로 동적 변경됨 */
        .grid-normal { grid-template-columns: repeat(8, 65px); }
        .grid-exam { grid-template-columns: repeat(9, 65px); }

        .seat {
            width: 60px; height: 60px; display: flex;
            justify-content: center; align-items: center;
            border: 2px solid #34495e; border-radius: 10px;
            font-weight: bold; font-size: 1.1em;
            background-color: #ebf5ff; cursor: pointer; transition: 0.2s;
        }
        .seat.empty {
            background-color: #ffeef0; border: 2px dashed #ff8a9a;
            color: #e74c3c; font-size: 0.8em; cursor: default;
        }
        .seat.shuffling {
            animation: bounce 0.4s infinite;
            background-color: #fff9c4 !important;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .seat.selected-swap {
            border-color: #f39c12; background-color: #fef5e7;
            box-shadow: 0 0 15px #f39c12; transform: scale(1.1); z-index: 10;
        }
        #controls { display: flex; gap: 12px; margin-bottom: 25px; }
        button {
            padding: 12px 24px; font-size: 16px; font-weight: 600;
            border-radius: 8px; border: none; cursor: pointer; color: white;
        }
        #input-mode-button { background-color: #8e44ad; }
        #random-button { background-color: #27ae60; }
        #swap-button { background-color: #2980b9; }
        #reset-button { background-color: #c0392b; }
        #input-container {
            background: white; padding: 25px; border-radius: 15px;
            display: none; flex-direction: column; gap: 15px;
            width: 400px; border-top: 5px solid #8e44ad; margin-bottom: 20px;
        }
        .row-indicator {
            text-align: center; font-size: 0.9em; color: #7f8c8d; 
            padding: 15px 0 5px; border-bottom: 1px solid #eee; margin-bottom: 5px;
        }
        /* 그리드 내 줄 표시기 너비 자동 조절 */
        .normal-span { grid-column: 1 / span 8; }
        .exam-span { grid-column: 1 / span 9; }
        #status { font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🏫 맞춤형 자리 배치 프로그램</h1>

    <div id="controls">
        <button id="input-mode-button" onclick="toggleInputMode()">⚙️ 배치 설정</button>
        <button id="random-button" onclick="shuffleAllSeats()" disabled>🎲 랜덤 섞기</button>
        <button id="swap-button" onclick="toggleSwapMode()" disabled>🔄 자리 교환</button>
        <button id="reset-button" onclick="location.reload()">↺ 초기화</button>
    </div>

    <div id="input-container">
        <label><b>1. 배치 유형 선택</b></label>
        <div>
            <label><input type="radio" name="layout" value="normal" checked> 일반형 </label>
            <label><input type="radio" name="layout" value="exam"> 모의 고사형 </label>
        </div>
        <label for="total-end-number"><b>2. 학생 마지막 번호</b></label>
        <input type="number" id="total-end-number" value="31" min="1">
        <label for="exclude-numbers"><b>3. 제외할 번호</b></label>
        <input type="text" id="exclude-numbers" placeholder="예: 5, 12">
        <button onclick="applySettings()" style="background-color: #27ae60;">적용하기</button>
    </div>

    <div id="status">설정을 완료해주세요.</div>
    <div id="seating-chart"></div>

    <script>
        let allSeatNumbers = [];
        let seatingMap = [];
        let isSwapMode = false;
        let firstSelected = null;
        let currentLayout = 'normal';

        function toggleInputMode() {
            const container = document.getElementById('input-container');
            container.style.display = (container.style.display === 'flex') ? 'none' : 'flex';
        }

        function applySettings() {
            const endNum = parseInt(document.getElementById('total-end-number').value);
            const exclStr = document.getElementById('exclude-numbers').value;
            currentLayout = document.querySelector('input[name="layout"]:checked').value;
            const excludes = exclStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            
            allSeatNumbers = [];
            for (let i = 1; i <= endNum; i++) {
                if (!excludes.includes(i)) allSeatNumbers.push(i);
            }

            const maxCap = currentLayout === 'exam' ? 35 : 36; 
            if (allSeatNumbers.length > maxCap) {
                alert(`최대 수용 인원을 초과했습니다. (최대 ${maxCap}명)`);
                return;
            }

            buildMap(allSeatNumbers);
            const chart = document.getElementById('seating-chart');
            chart.style.visibility = 'visible';
            chart.className = currentLayout === 'exam' ? 'grid-exam' : 'grid-normal';
            
            document.getElementById('random-button').disabled = false;
            document.getElementById('swap-button').disabled = false;
            document.getElementById('status').textContent = `✅ ${currentLayout === 'normal' ? '일반형' : '모의고사형'} 배치 완료`;
            toggleInputMode();
        }

        function buildMap(numbers) {
            // 일반형은 요청하신 대로 8열, 모의고사형은 지그재그를 위해 9열 사용
            const COLS = currentLayout === 'exam' ? 9 : 8;
            let ROWS = (currentLayout === 'exam' && numbers.length > 30) ? 7 : 6;

            seatingMap = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

            // 1단계: 통로 설정
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (currentLayout === 'exam') {
                        if ([1, 3, 5, 7].includes(c)) seatingMap[r][c] = 'EMPTY';
                    } else {
                        // 일반형: 2열과 5열만 통로 (8번 열은 아예 생성 안 함)
                        if ([2, 5].includes(c)) seatingMap[r][c] = 'EMPTY';
                    }
                }
            }

            // 2단계: 번호 부여
            let numIdx = 0;
            if (currentLayout === 'exam') {
                // [모의고사형] 1~30번 세로 우선 / 31번부터 7행 우측->좌측
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < 6; r++) {
                        if (seatingMap[r][c] !== 'EMPTY' && numIdx < numbers.length && numIdx < 30) {
                            seatingMap[r][c] = numbers[numIdx++];
                        }
                    }
                }
                if (numIdx < numbers.length && ROWS > 6) {
                    for (let c = COLS - 1; c >= 0; c--) {
                        if (seatingMap[6][c] !== 'EMPTY' && numIdx < numbers.length) {
                            seatingMap[6][c] = numbers[numIdx++];
                        }
                    }
                }
            } else {
                // [일반형] 가로 우선 (8열 구조)
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (seatingMap[r][c] !== 'EMPTY' && numIdx < numbers.length) {
                            seatingMap[r][c] = numbers[numIdx++];
                        }
                    }
                }
            }
            render();
        }

        function render() {
            const chart = document.getElementById('seating-chart');
            chart.innerHTML = '';
            const spanClass = currentLayout === 'exam' ? 'exam-span' : 'normal-span';

            seatingMap.forEach((row, r) => {
                const indicator = document.createElement('div');
                indicator.className = `row-indicator ${spanClass}`;
                indicator.textContent = `─── ${r + 1}번 라인 ───`;
                chart.appendChild(indicator);
                row.forEach((cell, c) => {
                    const div = document.createElement('div');
                    div.className = 'seat';
                    if (cell === 'EMPTY') {
                        div.classList.add('empty');
                        div.textContent = '통로';
                    } else if (cell === null) {
                        div.classList.add('empty');
                        div.textContent = '';
                    } else {
                        div.textContent = cell;
                        div.dataset.row = r; div.dataset.col = c;
                        div.onclick = handleSeatClick;
                    }
                    chart.appendChild(div);
                });
            });
        }

        function handleSeatClick(e) {
            if (!isSwapMode) return;
            const div = e.currentTarget;
            const r = parseInt(div.dataset.row);
            const c = parseInt(div.dataset.col);
            if (!firstSelected) {
                firstSelected = { r, c, div };
                div.classList.add('selected-swap');
            } else {
                const temp = seatingMap[firstSelected.r][firstSelected.c];
                seatingMap[firstSelected.r][firstSelected.c] = seatingMap[r][c];
                seatingMap[r][c] = temp;
                render();
                firstSelected = null;
            }
        }

        function shuffleAllSeats() {
            const btn = document.getElementById('random-button');
            btn.disabled = true;
            document.querySelectorAll('.seat:not(.empty)').forEach(s => {
                s.classList.add('shuffling'); s.textContent = '?';
            });
            setTimeout(() => {
                const shuffled = [...allSeatNumbers].sort(() => Math.random() - 0.5);
                buildMap(shuffled);
                btn.disabled = false;
            }, 800);
        }

        function toggleSwapMode() {
            isSwapMode = !isSwapMode;
            firstSelected = null;
            const btn = document.getElementById('swap-button');
            btn.style.backgroundColor = isSwapMode ? '#f39c12' : '#2980b9';
            btn.textContent = isSwapMode ? '🚫 취소' : '🔄 교환';
            document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected-swap'));
        }
    </script>
</body>
</html>
